<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Brothers Jiu-Jitsu | Gestão de Mensalidades</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #E74C3C;
      --primary-dark: #C0392B;
      --primary-light: #F1948A;
      --secondary: #1A1A2E;
      --secondary-light: #2D2D44;
      --accent: #F1C40F;
      --accent-light: #F9E79F;
      --bg: #0F0F1A;
      --bg-card: rgba(26, 26, 46, 0.92);
      --bg-card-hover: rgba(26, 26, 46, 0.98);
      --text: #ECF0F1;
      --text-muted: #95A5A6;
      --text-gold: #F1C40F;
      --success: #2ECC71;
      --danger: #E74C3C;
      --warning: #F39C12;
      --border: rgba(241, 196, 15, 0.2);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg: #F5F6FA;
      --bg-card: rgba(255, 255, 255, 0.95);
      --bg-card-hover: rgba(255, 255, 255, 1);
      --text: #2C3E50;
      --text-muted: #7F8C8D;
      --secondary: #ECF0F1;
      --secondary-light: #D5D8DC;
      --border: rgba(231, 76, 60, 0.2);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      transition: var(--transition);
      padding: 20px;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--secondary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }

    .dashboard {
      max-width: 1440px;
      margin: 0 auto;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
      transition: var(--transition);
      position: relative;
    }

    .header {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary), var(--primary-light));
      padding: 0;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(241, 196, 15, 0.15), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .header::after {
      content: '🥋';
      position: absolute;
      right: 30px;
      bottom: -20px;
      font-size: 120px;
      opacity: 0.1;
      pointer-events: none;
    }

    .header-content {
      padding: 25px 35px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      position: relative;
      z-index: 1;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-icon {
      width: 55px;
      height: 55px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .header-title h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: white;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .header-title p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-icon {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    .btn-icon i {
      font-size: 1rem;
    }

    .tab-navigation {
      display: flex;
      background: var(--secondary);
      border-bottom: 2px solid var(--border);
      padding: 0 30px;
      gap: 4px;
      overflow-x: auto;
      align-items: center;
    }

    .tab-btn {
      padding: 14px 24px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tab-btn:hover {
      color: var(--text);
      background: rgba(255, 255, 255, 0.05);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-btn-config {
      margin-left: auto;
      padding: 8px 16px;
      background: rgba(241, 196, 15, 0.12);
      border: 1px solid rgba(241, 196, 15, 0.3);
      border-radius: var(--radius-sm);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.7rem;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-btn-config:hover {
      background: rgba(241, 196, 15, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(241, 196, 15, 0.2);
    }

    .tab-content {
      display: none;
      animation: fadeInUp 0.3s ease;
    }

    .tab-content.active {
      display: block;
    }

    /* Stats - Lado a lado como no primeiro prompt */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      padding: 20px 30px;
      background: var(--secondary);
      border-bottom: 1px solid var(--border);
    }

    .stat-card {
      background: var(--bg-card);
      padding: 16px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .stat-icon.blue { background: rgba(52, 152, 219, 0.2); color: #3498DB; }
    .stat-icon.green { background: rgba(46, 204, 113, 0.2); color: #2ECC71; }
    .stat-icon.gold { background: rgba(241, 196, 15, 0.2); color: #F1C40F; }
    .stat-icon.red { background: rgba(231, 76, 60, 0.2); color: #E74C3C; }
    .stat-icon.purple { background: rgba(155, 89, 182, 0.2); color: #9B59B6; }
    .stat-icon.orange { background: rgba(243, 156, 18, 0.2); color: #F39C12; }

    .stat-info h4 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .stat-info .value {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }

    .stat-info .value.gold { color: var(--accent); }
    .stat-info .value.green { color: var(--success); }
    .stat-info .value.red { color: var(--danger); }
    .stat-info .value.purple { color: #9B59B6; }
    .stat-info .value.orange { color: #F39C12; }

    .control-panel {
      padding: 20px 30px;
      background: var(--secondary);
      border-bottom: 1px solid var(--border);
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 15px;
      align-items: start;
    }

    .control-left {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .input-group-modern {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .input-group-modern label {
      font-size: 0.65rem;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    .input-group-modern input,
    .input-group-modern select,
    .input-group-modern textarea {
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 500;
      outline: none;
      transition: var(--transition);
      width: 100%;
      min-width: 140px;
      font-family: 'Inter', sans-serif;
    }

    .input-group-modern textarea {
      resize: vertical;
      min-height: 60px;
    }

    .input-group-modern input:focus,
    .input-group-modern select:focus,
    .input-group-modern textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(241, 196, 15, 0.15);
    }

    .input-group-modern input::placeholder {
      color: var(--text-muted);
      opacity: 0.6;
    }

    .btn-modern {
      padding: 10px 22px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }

    .btn-modern:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    .btn-modern:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-primary:hover {
      box-shadow: 0 8px 30px rgba(231, 76, 60, 0.4);
    }

    .btn-success {
      background: linear-gradient(135deg, var(--success), #27AE60);
      color: white;
    }

    .btn-success:hover {
      box-shadow: 0 8px 30px rgba(46, 204, 113, 0.4);
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--accent), #D4AC0D);
      color: #1A1A2E;
    }

    .btn-gold:hover {
      box-shadow: 0 8px 30px rgba(241, 196, 15, 0.4);
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
    }

    .btn-outline:hover {
      background: var(--bg-card);
      border-color: var(--accent);
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 0.7rem;
    }

    .btn-danger {
      background: linear-gradient(135deg, var(--danger), #C0392B);
      color: white;
    }

    .btn-danger:hover {
      box-shadow: 0 8px 30px rgba(231, 76, 60, 0.4);
    }

    .turma-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 2px;
    }

    .turma-badge.infantil {
      background: rgba(52, 152, 219, 0.2);
      color: #3498DB;
      border: 1px solid rgba(52, 152, 219, 0.3);
    }

    .turma-badge.juvenil {
      background: rgba(46, 204, 113, 0.2);
      color: #2ECC71;
      border: 1px solid rgba(46, 204, 113, 0.3);
    }

    .turma-badge.adulto {
      background: rgba(231, 76, 60, 0.2);
      color: #E74C3C;
      border: 1px solid rgba(231, 76, 60, 0.3);
    }

    .search-section {
      padding: 15px 30px;
      background: var(--secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 15px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-wrapper {
      flex: 1;
      position: relative;
      min-width: 200px;
    }

    .search-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .search-wrapper input {
      width: 100%;
      padding: 10px 14px 10px 42px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .search-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(241, 196, 15, 0.15);
    }

    .filter-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .filter-chip:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .filter-chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .table-container {
      padding: 20px 30px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .table-modern {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
      font-size: 0.78rem;
      min-width: 1400px;
    }

    .table-modern th {
      text-align: left;
      padding: 12px 12px;
      font-weight: 700;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      border-bottom: 2px solid var(--border);
    }

    .table-modern th:first-child {
      padding-left: 16px;
    }

    .table-modern td {
      padding: 10px 12px;
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      transition: var(--transition);
      vertical-align: middle;
    }

    .table-modern tr:hover td {
      background: var(--bg-card-hover);
      transform: scale(1.002);
    }

    .table-modern td:first-child {
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
      padding-left: 16px;
    }

    .table-modern td:last-child {
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    .table-modern tbody tr:not(:last-child) td {
      border-bottom: 2px solid rgba(231, 76, 60, 0.15);
    }

    .table-modern tbody tr:last-child td {
      border-bottom: none;
    }

    .aluno-cell {
      display: flex;
      flex-direction: column;
    }

    .aluno-name {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text);
    }

    .aluno-whatsapp {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .aluno-whatsapp i {
      color: #25D366;
      font-size: 0.7rem;
    }

    .payment-check {
      width: 18px;
      height: 18px;
      accent-color: var(--success);
      cursor: pointer;
      transition: var(--transition);
      border-radius: 4px;
    }

    .payment-check:checked {
      accent-color: var(--success);
      transform: scale(1.1);
    }

    .payment-date-input {
      width: 72px;
      padding: 4px 6px;
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.7rem;
      text-align: center;
      outline: none;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }

    .payment-date-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(241, 196, 15, 0.15);
    }

    .payment-date-input.overdue {
      border-color: var(--danger);
      background: rgba(231, 76, 60, 0.1);
      color: var(--danger);
    }

    .action-buttons {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      color: white;
    }

    .action-btn:hover {
      transform: scale(1.1);
    }

    .action-btn.whatsapp { background: #25D366; }
    .action-btn.edit { background: #3498DB; }
    .action-btn.delete { background: #E74C3C; }

    .month-summary {
      padding: 12px 20px;
      background: var(--secondary);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .month-summary .title {
      font-weight: 700;
      color: var(--accent);
      font-size: 0.85rem;
    }

    .progress-wrap {
      flex: 1;
      min-width: 150px;
      background: var(--bg-card);
      border-radius: 20px;
      overflow: hidden;
      height: 8px;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), var(--accent));
      border-radius: 20px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .progress-text {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 80px;
    }

    .bulk-actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }

    .footer {
      padding: 15px 30px;
      background: var(--secondary);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .footer .shortcuts {
      display: flex;
      gap: 12px;
    }

    .footer .shortcuts span {
      background: var(--bg-card);
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 0.65rem;
      font-weight: 600;
    }

    #toastContainer {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 380px;
      pointer-events: none;
    }

    .toast {
      padding: 14px 20px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.85rem;
      box-shadow: var(--shadow);
      animation: slideInRight 0.4s ease, fadeOutRight 0.4s ease 2.8s;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: auto;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toast.success { background: linear-gradient(135deg, #2ECC71, #27AE60); color: white; }
    .toast.error { background: linear-gradient(135deg, #E74C3C, #C0392B); color: white; }
    .toast.warning { background: linear-gradient(135deg, #F39C12, #D4AC0D); color: white; }
    .toast.info { background: linear-gradient(135deg, #3498DB, #2980B9); color: white; }

    @keyframes slideInRight {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes fadeOutRight {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(20px); }
    }

    .modal {
      dis
